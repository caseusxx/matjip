<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺 맛집 가이드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9f8f6;color:#1a1a1a;min-height:100vh}
.page{max-width:900px;margin:0 auto;padding:2rem 1.25rem}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:14px;color:#888;margin-bottom:1.5rem}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1.5rem}
.add-btn{background:#D85A30;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.add-btn:hover{background:#993C1D}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:500px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:.85rem 1rem;cursor:pointer;transition:border-color .15s}
.stat:hover{border-color:#D85A30}
.stat.active-stat{border-color:#D85A30;background:#fff8f6}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-num{font-size:22px;font-weight:600}
.filter-section{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:12px;color:#888;font-weight:500;width:36px;flex-shrink:0}
.chip{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .15s}
.chip:hover{border-color:#D85A30;color:#D85A30}
.chip.active{background:#FAECE7;border-color:#D85A30;color:#712B13;font-weight:500}
.search-wrap{position:relative;margin-bottom:1rem}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
.search-wrap input:focus{border-color:#D85A30}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#aaa;font-size:17px;pointer-events:none}
.fav-banner{background:#FAEEDA;border:1px solid #FAC775;border-radius:8px;padding:10px 14px;display:none;align-items:center;gap:8px;margin-bottom:1rem;font-size:13px;color:#412402}
.fav-banner.show{display:flex}
.count-bar{font-size:13px;color:#888;margin-bottom:10px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s}
.card:hover{border-color:#ccc}
.card.visited{border-color:#1D9E75}
.card.faved{border-color:#EF9F27}
.card-img{width:100%;height:150px;object-fit:cover;display:block;background:#f0efed}
.card-img-placeholder{width:100%;height:150px;background:#f0efed;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:30px}
.card-body{padding:1rem 1.1rem;display:flex;flex-direction:column;gap:8px;flex:1}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-size:15px;font-weight:600;color:#1a1a1a;line-height:1.3}
.card-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;color:#bbb;font-size:17px;padding:3px;line-height:1;border-radius:4px;transition:color .15s}
.icon-btn:hover{color:#D85A30}
.icon-btn.visit-on{color:#0F6E56}
.icon-btn.fav-on{color:#BA7517}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:500}
.badge-region{background:#FAEEDA;color:#633806}
.badge-cat{background:#FAECE7;color:#4A1B0C}
.badge-visited{background:#E1F5EE;color:#085041}
.badge-wish{background:#f1f0ee;color:#555}
.badge-fav{background:#FAEEDA;color:#412402}
.stars{display:flex;gap:1px}
.star{font-size:13px;color:#EF9F27}
.star.off{color:#ddd}
.card-note{font-size:13px;color:#666;line-height:1.55}
.card-link a{font-size:13px;color:#185FA5;text-decoration:none;display:flex;align-items:center;gap:4px}
.card-link a:hover{text-decoration:underline}
.empty{text-align:center;padding:3.5rem 1rem;color:#aaa;font-size:14px;grid-column:1/-1}
.empty i{font-size:32px;display:block;margin-bottom:10px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:min(480px,100%);max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;gap:13px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h2{font-size:17px;font-weight:600}
.modal label{font-size:13px;color:#666;display:block;margin-bottom:4px}
.modal input,.modal select,.modal textarea{width:100%;font-size:14px;padding:9px 11px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:#D85A30}
.modal textarea{resize:vertical;min-height:68px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fav-check-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f9f8f6;border-radius:8px;cursor:pointer}
.fav-check-row input[type=checkbox]{width:16px;height:16px;accent-color:#BA7517;flex-shrink:0;cursor:pointer}
.fav-check-row label{font-size:13px;color:#1a1a1a;cursor:pointer;margin:0}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-cancel{background:none;border:1px solid #ddd;border-radius:8px;padding:8px 18px;font-size:14px;cursor:pointer;color:#555}
.btn-cancel:hover{border-color:#aaa}
.btn-save{background:#D85A30;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:14px;cursor:pointer;font-weight:500}
.btn-save:hover{background:#993C1D}
.img-preview{width:100%;height:120px;object-fit:cover;border-radius:8px;margin-top:6px;display:none}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#0F6E56;color:#E1F5EE;font-size:13px;padding:8px 16px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div>
      <h1>🗺 맛집 가이드</h1>
      <p class="subtitle">서울·경기 위주 — 나만의 맛집 문서</p>
    </div>
    <button class="add-btn" onclick="openModal()"><i class="ti ti-plus"></i> 맛집 추가</button>
  </div>

  <div class="stats-row">
    <div class="stat active-stat" id="st-all" onclick="setQuick('all')">
      <div class="stat-label">전체</div>
      <div class="stat-num" id="sTotal">0</div>
    </div>
    <div class="stat" id="st-fav" onclick="setQuick('fav')">
      <div class="stat-label">⭐ 찐맛집</div>
      <div class="stat-num" id="sFav" style="color:#BA7517">0</div>
    </div>
    <div class="stat" id="st-visited" onclick="setQuick('visited')">
      <div class="stat-label">다녀온 곳</div>
      <div class="stat-num" id="sVisited" style="color:#0F6E56">0</div>
    </div>
    <div class="stat" id="st-wish" onclick="setQuick('wish')">
      <div class="stat-label">가고 싶은 곳</div>
      <div class="stat-num" id="sWish" style="color:#D85A30">0</div>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-row">
      <span class="filter-label">지역</span>
      <div id="regionFilters" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">종류</span>
      <div id="catFilters" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">방문</span>
      <div style="display:flex;gap:6px">
        <span class="chip active" data-v="전체" onclick="setVisit('전체')">전체</span>
        <span class="chip" data-v="다녀왔어요" onclick="setVisit('다녀왔어요')">다녀왔어요</span>
        <span class="chip" data-v="가고 싶어요" onclick="setVisit('가고 싶어요')">가고 싶어요</span>
      </div>
    </div>
  </div>

  <div class="search-wrap">
    <i class="ti ti-search si"></i>
    <input type="text" placeholder="가게 이름, 메모로 검색..." id="searchInput" oninput="render()">
  </div>

  <div class="fav-banner" id="favBanner">
    <i class="ti ti-star" style="font-size:18px;color:#BA7517"></i>
    <span>또 가고 싶은 찐맛집만 보는 중이에요</span>
  </div>

  <div class="count-bar" id="countBar"></div>
  <div class="cards" id="cards"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <h2 id="modalTitle">맛집 추가</h2>
    <div>
      <label>가게 이름 *</label>
      <input type="text" id="fName" placeholder="예: 을지로 양대창">
    </div>
    <div class="two-col">
      <div><label>지역 *</label><select id="fRegion"><option value="">선택</option></select></div>
      <div><label>음식 종류 *</label><select id="fCat"><option value="">선택</option></select></div>
    </div>
    <div class="two-col">
      <div>
        <label>별점</label>
        <select id="fStars">
          <option value="5">★★★★★ (5)</option>
          <option value="4">★★★★ (4)</option>
          <option value="3" selected>★★★ (3)</option>
          <option value="2">★★ (2)</option>
          <option value="1">★ (1)</option>
        </select>
      </div>
      <div>
        <label>방문 여부</label>
        <select id="fVisit">
          <option value="가고 싶어요">가고 싶어요</option>
          <option value="다녀왔어요">다녀왔어요</option>
        </select>
      </div>
    </div>
    <div class="fav-check-row">
      <input type="checkbox" id="fFav">
      <label for="fFav">⭐ 찐맛집 — 또 가고 싶은 집</label>
    </div>
    <div>
      <label>메모 (추천 메뉴, 팁 등)</label>
      <textarea id="fNote" placeholder="예: 대창 必, 웨이팅 1시간 각오"></textarea>
    </div>
    <div>
      <label>링크 (네이버 지도, 인스타 등)</label>
      <input type="text" id="fLink" placeholder="https://...">
    </div>
    <div>
      <label>사진 URL</label>
      <input type="text" id="fImg" placeholder="https://...jpg" oninput="previewImg()">
      <img id="imgPreview" class="img-preview" alt="미리보기">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEntry()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">저장됨</div>

<script>
const REGIONS=["강남/서초","홍대/마포","이태원/한남","을지로/종로","성수/왕십리","연남/연희","경기"];
const CATS=["한식","고기/구이","해산물","일식","중식","양식","카페/디저트","분식","술집/바"];
const SK='food_guide_v2';

let places=[], nextId=1;
let selRegion='전체', selCat='전체', selVisit='전체', quickMode='all';
let editId=null;

function load(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){const d=JSON.parse(raw);places=d.places||[];nextId=d.nextId||(places.length+1);}
  }catch(e){}
  if(!places.length){
    places=[
      {id:1,name:"도산면옥",region:"강남/서초",cat:"한식",stars:5,visit:"다녀왔어요",fav:true,note:"평냉 원탑. 여름 필수 방문",link:"",img:""},
      {id:2,name:"육전식당",region:"을지로/종로",cat:"고기/구이",stars:5,visit:"다녀왔어요",fav:true,note:"육전+막걸리 조합 미침. 웨이팅 필수",link:"",img:""},
      {id:3,name:"오무라이스짱",region:"홍대/마포",cat:"양식",stars:4,visit:"가고 싶어요",fav:false,note:"오무라이스 종류가 엄청 많음",link:"",img:""},
      {id:4,name:"성수연방 베이커리",region:"성수/왕십리",cat:"카페/디저트",stars:4,visit:"다녀왔어요",fav:false,note:"소금빵 맛있음. 오픈런 감수 각오",link:"",img:""},
      {id:5,name:"판교 고기리막국수",region:"경기",cat:"한식",stars:5,visit:"가고 싶어요",fav:false,note:"들기름 막국수 실화임. 주말 웨이팅 2시간",link:"",img:""}
    ];
    nextId=6;
  }
  populateSelects();render();
}

function persist(){
  try{localStorage.setItem(SK,JSON.stringify({places,nextId}));}catch(e){}
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function populateSelects(){
  document.getElementById('fRegion').innerHTML='<option value="">선택</option>'+REGIONS.map(r=>`<option value="${r}">${r}</option>`).join('');
  document.getElementById('fCat').innerHTML='<option value="">선택</option>'+CATS.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function buildFilters(){
  document.getElementById('regionFilters').innerHTML=
    ['전체',...REGIONS].map(r=>`<span class="chip ${selRegion===r?'active':''}" onclick="setRegion('${r}')">${r}</span>`).join('');
  document.getElementById('catFilters').innerHTML=
    ['전체',...CATS].map(c=>`<span class="chip ${selCat===c?'active':''}" onclick="setCat('${c}')">${c}</span>`).join('');
  document.querySelectorAll('[data-v]').forEach(el=>{
    el.classList.toggle('active',el.dataset.v===selVisit);
  });
  ['all','fav','visited','wish'].forEach(k=>{
    document.getElementById('st-'+k).classList.toggle('active-stat',quickMode===k);
  });
  const fb=document.getElementById('favBanner');
  fb.classList.toggle('show',quickMode==='fav');
}

function setRegion(r){selRegion=r;render()}
function setCat(c){selCat=c;render()}
function setVisit(v){selVisit=v;quickMode='all';render()}
function setQuick(m){quickMode=m;if(m!=='all')selVisit='전체';render()}

function starsHTML(n){
  return Array.from({length:5},(_,i)=>`<span class="star${i<n?'':' off'}">★</span>`).join('');
}

function render(){
  buildFilters();
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=places.filter(p=>{
    if(quickMode==='fav'&&!p.fav)return false;
    if(quickMode==='visited'&&p.visit!=='다녀왔어요')return false;
    if(quickMode==='wish'&&p.visit!=='가고 싶어요')return false;
    if(selRegion!=='전체'&&p.region!==selRegion)return false;
    if(selCat!=='전체'&&p.cat!==selCat)return false;
    if(selVisit!=='전체'&&p.visit!==selVisit)return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!(p.note||'').toLowerCase().includes(q))return false;
    return true;
  });

  document.getElementById('sTotal').textContent=places.length;
  document.getElementById('sFav').textContent=places.filter(p=>p.fav).length;
  document.getElementById('sVisited').textContent=places.filter(p=>p.visit==='다녀왔어요').length;
  document.getElementById('sWish').textContent=places.filter(p=>p.visit==='가고 싶어요').length;
  document.getElementById('countBar').textContent=`${filtered.length}곳 표시 중`;

  const el=document.getElementById('cards');
  if(!filtered.length){
    el.innerHTML='<div class="empty"><i class="ti ti-mood-sad"></i>조건에 맞는 맛집이 없어요</div>';
    return;
  }

  const sorted=[...filtered].sort((a,b)=>(b.fav?1:0)-(a.fav?1:0));
  el.innerHTML=sorted.map(p=>`
    <div class="card ${p.fav?'faved':p.visit==='다녀왔어요'?'visited':''}">
      ${p.img
        ?`<img class="card-img" src="${p.img}" alt="${p.name}" onerror="this.style.display='none'">`
        :`<div class="card-img-placeholder"><i class="ti ti-photo"></i></div>`}
      <div class="card-body">
        <div class="card-header">
          <div class="card-name">${p.name}</div>
          <div class="card-actions">
            <button class="icon-btn ${p.fav?'fav-on':''}" onclick="toggleFav(${p.id})" title="찐맛집"><i class="ti ti-star"></i></button>
            <button class="icon-btn ${p.visit==='다녀왔어요'?'visit-on':''}" onclick="toggleVisit(${p.id})" title="방문 체크"><i class="ti ti-${p.visit==='다녀왔어요'?'circle-check':'circle'}"></i></button>
            <button class="icon-btn" onclick="startEdit(${p.id})" title="수정"><i class="ti ti-edit"></i></button>
            <button class="icon-btn" onclick="deleteEntry(${p.id})" title="삭제"><i class="ti ti-trash"></i></button>
          </div>
        </div>
        <div class="badges">
          <span class="badge badge-region">${p.region}</span>
          <span class="badge badge-cat">${p.cat}</span>
          <span class="badge ${p.visit==='다녀왔어요'?'badge-visited':'badge-wish'}">${p.visit}</span>
          ${p.fav?`<span class="badge badge-fav">⭐ 찐맛집</span>`:''}
        </div>
        <div class="stars">${starsHTML(p.stars)}</div>
        ${p.note?`<div class="card-note">${p.note}</div>`:''}
        ${p.link?`<div class="card-link"><a href="${p.link}" target="_blank"><i class="ti ti-external-link"></i> 링크 보기</a></div>`:''}
      </div>
    </div>
  `).join('');
}

function toggleFav(id){places=places.map(p=>p.id===id?{...p,fav:!p.fav}:p);persist();render()}
function toggleVisit(id){places=places.map(p=>p.id===id?{...p,visit:p.visit==='다녀왔어요'?'가고 싶어요':'다녀왔어요'}:p);persist();render()}

function previewImg(){
  const url=document.getElementById('fImg').value.trim();
  const prev=document.getElementById('imgPreview');
  if(url){prev.src=url;prev.style.display='block';}else{prev.style.display='none';}
}

function openModal(){
  editId=null;
  document.getElementById('modalTitle').textContent='맛집 추가';
  ['fName','fNote','fLink','fImg'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fRegion').value='';
  document.getElementById('fCat').value='';
  document.getElementById('fStars').value='3';
  document.getElementById('fVisit').value='가고 싶어요';
  document.getElementById('fFav').checked=false;
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('modalOverlay').classList.add('open');
}

function startEdit(id){
  const p=places.find(x=>x.id===id);
  editId=id;
  document.getElementById('modalTitle').textContent='맛집 수정';
  document.getElementById('fName').value=p.name;
  document.getElementById('fRegion').value=p.region;
  document.getElementById('fCat').value=p.cat;
  document.getElementById('fStars').value=p.stars;
  document.getElementById('fVisit').value=p.visit;
  document.getElementById('fFav').checked=!!p.fav;
  document.getElementById('fNote').value=p.note||'';
  document.getElementById('fLink').value=p.link||'';
  document.getElementById('fImg').value=p.img||'';
  const prev=document.getElementById('imgPreview');
  if(p.img){prev.src=p.img;prev.style.display='block';}else{prev.style.display='none';}
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
function overlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal()}

function saveEntry(){
  const name=document.getElementById('fName').value.trim();
  const region=document.getElementById('fRegion').value;
  const cat=document.getElementById('fCat').value;
  if(!name||!region||!cat){alert('이름, 지역, 종류는 필수예요!');return;}
  const entry={
    id:editId||nextId++,name,region,cat,
    stars:parseInt(document.getElementById('fStars').value),
    visit:document.getElementById('fVisit').value,
    fav:document.getElementById('fFav').checked,
    note:document.getElementById('fNote').value.trim(),
    link:document.getElementById('fLink').value.trim(),
    img:document.getElementById('fImg').value.trim()
  };
  if(editId)places=places.map(p=>p.id===editId?entry:p);
  else places.push(entry);
  closeModal();persist();render();
}

function deleteEntry(id){
  if(!confirm('이 맛집을 삭제할까요?'))return;
  places=places.filter(p=>p.id!==id);
  persist();render();
}

load();
</script>
</body>
</html>
